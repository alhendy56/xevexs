<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Xevexs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>* { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-primary-600 to-primary-800 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-primary-600 rounded-2xl flex items-center justify-center text-white text-3xl mx-auto mb-4">
                <i class="fas fa-cog"></i>
            </div>
            <h1 class="text-2xl font-bold">لوحة التحكم</h1>
            <p class="text-gray-500">Xevexs Admin</p>
        </div>

        <form onsubmit="handleAdminLogin(event)">
            <div class="mb-4">
                <input type="email" placeholder="admin@xevexs.com" required class="w-full px-4 py-3 border rounded-xl">
            </div>
            <div class="mb-6">
                <input type="password" placeholder="كلمة المرور" required class="w-full px-4 py-3 border rounded-xl">
            </div>
            <button type="submit" class="w-full bg-primary-600 text-white py-3 rounded-xl font-bold hover:bg-primary-700">
                دخول لوحة التحكم
            </button>
        </form>
    </div>

    <script>
        function handleAdminLogin(e) {
            e.preventDefault();
            localStorage.setItem('xevexs_admin', 'true');
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
