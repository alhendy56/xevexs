<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتجات | Xevexs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 600: '#16a34a', 700: '#15803d' },
                        secondary: '#C4A35A'
                    }
                }
            }
        }
    </script>
    <style>* { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <header class="fixed top-0 w-full bg-white shadow-sm z-50">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center text-white font-bold">X</div>
                <span class="text-2xl font-bold text-primary-800">evexs</span>
            </a>
            <button onclick="toggleCart()" class="relative">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 w-5 h-5 bg-secondary text-white text-xs rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
    </header>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="fixed top-0 right-0 h-full w-96 bg-white shadow-2xl z-50 transform translate-x-full transition flex flex-col">
        <div class="p-4 border-b flex justify-between">
            <h2 class="text-lg font-bold">سلة التسوق</h2>
            <button onclick="toggleCart()"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-4"><div class="text-center text-gray-400 py-8">السلة فارغة</div></div>
        <div class="p-4 border-t bg-gray-50">
            <a href="checkout.html" class="block w-full bg-primary-600 text-white text-center py-3 rounded-lg font-bold">إتمام الطلب</a>
        </div>
    </div>
    <div id="cartOverlay" onclick="toggleCart()" class="fixed inset-0 bg-black/50 z-40 hidden"></div>

    <main class="pt-24 pb-16 container mx-auto px-4">
        <h1 class="text-3xl font-bold mb-8">جميع المنتجات</h1>
        
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Filters -->
            <aside class="lg:w-64">
                <div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24">
                    <h3 class="font-bold text-lg mb-4">تصفية</h3>
                    <div class="space-y-4">
                        <div>
                            <h4 class="font-bold mb-2">الفئات</h4>
                            <label class="flex items-center gap-2"><input type="checkbox" class="rounded text-primary-600"> <span>أدوات المطبخ</span></label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="rounded text-primary-600"> <span>أدوات منزلية</span></label>
                            <label class="flex items-center gap-2"><input type="checkbox" class="rounded text-primary-600"> <span>أجهزة ذكية</span></label>
                        </div>
                        <div>
                            <h4 class="font-bold mb-2">السعر</h4>
                            <input type="range" class="w-full accent-primary-600">
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Products Grid -->
            <div class="flex-1">
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                        <div class="aspect-square bg-gray-100 relative group">
                            <img src="https://images.unsplash.com/photo-1570222094114-28a9d88a65e7?w=400" class="w-full h-full object-cover">
                            <button onclick="addToCart(1)" class="absolute bottom-0 left-0 right-0 bg-primary-600 text-white py-2 opacity-0 group-hover:opacity-100 transition">أضف للسلة</button>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold">عصارة كهربائية</h3>
                            <p class="text-primary-700 font-bold mt-2">450 EGP</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                        <div class="aspect-square bg-gray-100 relative group">
                            <img src="https://images.unsplash.com/photo-1556909114-44e3e70034e2?w=400" class="w-full h-full object-cover">
                            <button onclick="addToCart(2)" class="absolute bottom-0 left-0 right-0 bg-primary-600 text-white py-2 opacity-0 group-hover:opacity-100 transition">أضف للسلة</button>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold">خلاط كهربائي</h3>
                            <p class="text-primary-700 font-bold mt-2">650 EGP</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                        <div class="aspect-square bg-gray-100 relative group">
                            <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=400" class="w-full h-full object-cover">
                            <button onclick="addToCart(3)" class="absolute bottom-0 left-0 right-0 bg-primary-600 text-white py-2 opacity-0 group-hover:opacity-100 transition">أضف للسلة</button>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold">مصباح ذكي</h3>
                            <p class="text-primary-700 font-bold mt-2">799 EGP</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem('xevexs_cart') || '[]');
        document.getElementById('cartCount').textContent = cart.length;
        
        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('translate-x-full');
            document.getElementById('cartOverlay').classList.toggle('hidden');
        }
        
        function addToCart(id) {
            cart.push({ id, qty: 1 });
            localStorage.setItem('xevexs_cart', JSON.stringify(cart));
            document.getElementById('cartCount').textContent = cart.length;
            toggleCart();
        }
    </script>
</body>
</html>
