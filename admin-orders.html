<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطلبات | Xevexs Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>* { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-100">

    <aside class="fixed right-0 top-0 h-full w-64 bg-slate-900 text-white z-50">
        <div class="p-6 border-b border-slate-700">
            <h1 class="font-bold text-xl">Xevexs Admin</h1>
        </div>
        <nav class="p-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="products.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl"><i class="fas fa-box"></i> المنتجات</a>
            <a href="orders.html" class="flex items-center gap-3 px-4 py-3 bg-primary-600 rounded-xl"><i class="fas fa-shopping-bag"></i> الطلبات</a>
        </nav>
    </aside>

    <main class="mr-64 p-8">
        <h2 class="text-2xl font-bold mb-6">إدارة الطلبات</h2>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-right">رقم الطلب</th>
                        <th class="px-6 py-4 text-right">العميل</th>
                        <th class="px-6 py-4 text-right">المبلغ</th>
                        <th class="px-6 py-4 text-right">الحالة</th>
                        <th class="px-6 py-4 text-right">تاجر</th>
                        <th class="px-6 py-4 text-right">إجراء</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="border-b hover:bg-gray-50">
                        <td class="px-6 py-4 font-bold">#XE-2024-001245</td>
                        <td class="px-6 py-4">
                            <p class="font-bold">أحمد محمد</p>
                            <p class="text-sm text-gray-500">01012345678</p>
                        </td>
                        <td class="px-6 py-4 font-bold">1,250 EGP</td>
                        <td class="px-6 py-4">
                            <select onchange="updateStatus(this)" class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-lg text-sm border-0">
                                <option value="new">جديد</option>
                                <option value="processing" selected>قيد التجهيز</option>
                                <option value="shipped">تم الشحن</option>
                                <option value="delivered">تم التسليم</option>
                            </select>
                        </td>
                        <td class="px-6 py-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">تم الإرسال</span></td>
                        <td class="px-6 py-4">
                            <button onclick="sendToTaager('XE-2024-001245')" class="text-purple-600 hover:underline text-sm">إرسال لتاجر</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        if (!localStorage.getItem('xevexs_admin')) window.location.href = 'index.html';
        
        function updateStatus(select) {
            const colors = {
                new: 'bg-blue-100 text-blue-700',
                processing: 'bg-yellow-100 text-yellow-700',
                shipped: 'bg-purple-100 text-purple-700',
                delivered: 'bg-green-100 text-green-700'
            };
            select.className = colors[select.value] + ' px-3 py-1 rounded-lg text-sm border-0';
        }
        
        function sendToTaager(orderId) {
            alert('جاري إرسال الطلب ' + orderId + ' إلى تاجر...');
            setTimeout(() => alert('تم الإرسال بنجاح!'), 1500);
        }
    </script>
</body>
</html>
