<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Xevexs Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>* { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-100">

    <!-- Sidebar -->
    <aside class="fixed right-0 top-0 h-full w-64 bg-slate-900 text-white z-50">
        <div class="p-6 border-b border-slate-700">
            <h1 class="font-bold text-xl">Xevexs Admin</h1>
        </div>
        <nav class="p-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-primary-600 rounded-xl"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="products.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl"><i class="fas fa-box"></i> المنتجات</a>
            <a href="orders.html" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl"><i class="fas fa-shopping-bag"></i> الطلبات</a>
            <a href="#" onclick="logout()" class="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-xl text-red-400"><i class="fas fa-sign-out-alt"></i> خروج</a>
        </nav>
    </aside>

    <main class="mr-64 p-8">
        <h2 class="text-2xl font-bold mb-6">نظرة عامة</h2>
        
        <div class="grid grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <p class="text-gray-500 text-sm">إجمالي الطلبات</p>
                <p class="text-3xl font-bold text-blue-600">1,284</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <p class="text-gray-500 text-sm">المبيعات</p>
                <p class="text-3xl font-bold text-green-600">156,420</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <p class="text-gray-500 text-sm">عملاء جدد</p>
                <p class="text-3xl font-bold text-purple-600">328</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <p class="text-gray-500 text-sm">منتجات منخفضة</p>
                <p class="text-3xl font-bold text-orange-600">23</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-6">
            <h3 class="text-lg font-bold mb-4">أحدث الطلبات</h3>
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-right">رقم الطلب</th>
                        <th class="px-4 py-3 text-right">العميل</th>
                        <th class="px-4 py-3 text-right">المبلغ</th>
                        <th class="px-4 py-3 text-right">الحالة</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="border-b">
                        <td class="px-4 py-3">#XE-2024-001245</td>
                        <td class="px-4 py-3">أحمد محمد</td>
                        <td class="px-4 py-3">1,250 EGP</td>
                        <td class="px-4 py-3"><span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-sm">قيد التجهيز</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        if (!localStorage.getItem('xevexs_admin')) window.location.href = 'index.html';
        function logout() {
            localStorage.removeItem('xevexs_admin');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
