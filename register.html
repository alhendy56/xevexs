<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | Xevexs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>* { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-lg p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4">X</div>
            <h1 class="text-2xl font-bold">إنشاء حساب جديد</h1>
        </div>

        <form class="space-y-4" onsubmit="handleRegister(event)">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" placeholder="الاسم الأول" required class="w-full px-4 py-3 border rounded-xl">
                <input type="text" placeholder="الاسم الأخير" required class="w-full px-4 py-3 border rounded-xl">
            </div>
            <input type="email" placeholder="البريد الإلكتروني" required class="w-full px-4 py-3 border rounded-xl">
            <input type="tel" placeholder="رقم الهاتف" required class="w-full px-4 py-3 border rounded-xl">
            <input type="password" placeholder="كلمة المرور" required class="w-full px-4 py-3 border rounded-xl">
            <button type="submit" class="w-full bg-primary-600 text-white py-3 rounded-xl font-bold hover:bg-primary-700">إنشاء الحساب</button>
        </form>

        <p class="text-center mt-6 text-sm">لديك حساب؟ <a href="login.html" class="text-primary-600 font-bold">تسجيل الدخول</a></p>
    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            alert('تم إنشاء الحساب!');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
