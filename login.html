<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Xevexs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>* { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-lg p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4">X</div>
            <h1 class="text-2xl font-bold">تسجيل الدخول</h1>
        </div>

        <form class="space-y-4" onsubmit="handleLogin(event)">
            <div>
                <label class="block text-sm font-medium mb-1">البريد الإلكتروني</label>
                <input type="email" required class="w-full px-4 py-3 border rounded-xl focus:border-primary-600 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">كلمة المرور</label>
                <input type="password" required class="w-full px-4 py-3 border rounded-xl focus:border-primary-600 focus:outline-none">
            </div>
            <button type="submit" class="w-full bg-primary-600 text-white py-3 rounded-xl font-bold hover:bg-primary-700">دخول</button>
        </form>

        <p class="text-center mt-6 text-sm">ليس لديك حساب؟ <a href="register.html" class="text-primary-600 font-bold">إنشاء حساب</a></p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            // TODO: Backend - Verify login
            localStorage.setItem('xevexs_user', 'true');
            window.location.href = 'account.html';
        }
    </script>
</body>
</html>
