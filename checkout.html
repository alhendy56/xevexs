<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | Xevexs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>* { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary-600 rounded flex items-center justify-center text-white font-bold">X</div>
                <span class="text-xl font-bold text-primary-800">evexs</span>
            </a>
            <span class="text-gray-500">خطوة 1 من 2</span>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <h2 class="text-xl font-bold mb-4"><i class="fas fa-map-marker-alt text-primary-600 ml-2"></i> عنوان الشحن</h2>
                    <form class="space-y-4">
                        <div class="grid md:grid-cols-2 gap-4">
                            <input type="text" placeholder="الاسم الأول" class="w-full px-4 py-3 border rounded-lg">
                            <input type="text" placeholder="الاسم الأخير" class="w-full px-4 py-3 border rounded-lg">
                        </div>
                        <input type="tel" placeholder="رقم الهاتف" class="w-full px-4 py-3 border rounded-lg">
                        <select class="w-full px-4 py-3 border rounded-lg">
                            <option>🇪🇬 مصر</option>
                            <option>🇸🇦 السعودية</option>
                            <option>🇦🇪 الإمارات</option>
                        </select>
                        <textarea placeholder="العنوان بالتفصيل" rows="3" class="w-full px-4 py-3 border rounded-lg resize-none"></textarea>
                    </form>
                </div>

                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <h2 class="text-xl font-bold mb-4"><i class="fas fa-credit-card text-primary-600 ml-2"></i> طريقة الدفع</h2>
                    <label class="flex items-center gap-3 p-4 border-2 border-primary-600 rounded-xl bg-primary-50">
                        <input type="radio" name="payment" checked class="text-primary-600">
                        <i class="fas fa-money-bill-wave text-green-600 text-xl"></i>
                        <div>
                            <p class="font-bold">الدفع عند الاستلام</p>
                            <p class="text-sm text-gray-500">ادفع نقداً عند استلام طلبك</p>
                        </div>
                    </label>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-6 h-fit sticky top-24">
                <h2 class="text-xl font-bold mb-4">ملخص الطلب</h2>
                <div class="space-y-3 mb-4">
                    <div class="flex justify-between text-sm"><span>المجموع</span><span>1,250 EGP</span></div>
                    <div class="flex justify-between text-sm"><span>الشحن</span><span>50 EGP</span></div>
                    <div class="flex justify-between font-bold text-lg border-t pt-2"><span>الإجمالي</span><span class="text-primary-700">1,300 EGP</span></div>
                </div>
                <button onclick="placeOrder()" class="w-full bg-primary-600 text-white py-3 rounded-xl font-bold hover:bg-primary-700">تأكيد الطلب</button>
            </div>
        </div>
    </main>

    <script>
        function placeOrder() {
            // TODO: Backend - Process order
            // TODO: Backend - Send to Taager if enabled
            alert('تم تأكيد طلبك بنجاح!');
            localStorage.removeItem('xevexs_cart');
            window.location.href = 'order-success.html?order=12345';
        }
    </script>
</body>
</html>
