<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي | Xevexs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>* { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-100">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-primary-600 rounded flex items-center justify-center text-white font-bold">X</div>
                <span class="text-xl font-bold text-primary-800">evexs</span>
            </a>
            <button onclick="logout()" class="text-red-500">تسجيل الخروج</button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <aside class="lg:w-64">
                <div class="bg-white rounded-2xl shadow-sm p-6 sticky top-24">
                    <div class="text-center mb-6">
                        <div class="w-20 h-20 bg-primary-100 rounded-full flex items-center justify-center text-primary-700 text-3xl font-bold mx-auto mb-3">أ</div>
                        <h2 class="font-bold">أحمد محمد</h2>
                    </div>
                    <nav class="space-y-1">
                        <a href="account.html" class="block px-4 py-3 bg-primary-50 text-primary-700 rounded-xl font-bold"><i class="fas fa-user ml-2"></i> الملف الشخصي</a>
                        <a href="orders.html" class="block px-4 py-3 hover:bg-gray-50 rounded-xl"><i class="fas fa-shopping-bag ml-2"></i> طلباتي</a>
                    </nav>
                </div>
            </aside>

            <div class="flex-1">
                <div class="bg-white rounded-2xl shadow-sm p-6">
                    <h2 class="text-xl font-bold mb-6">المعلومات الشخصية</h2>
                    <form class="space-y-4 max-w-md">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" value="أحمد" class="w-full px-4 py-3 border rounded-xl">
                            <input type="text" value="محمد" class="w-full px-4 py-3 border rounded-xl">
                        </div>
                        <input type="email" value="ahmed@email.com" class="w-full px-4 py-3 border rounded-xl">
                        <button type="button" onclick="alert('تم الحفظ')" class="bg-primary-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-primary-700">حفظ التغييرات</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        if (!localStorage.getItem('xevexs_user')) window.location.href = 'login.html';
        function logout() {
            localStorage.removeItem('xevexs_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
